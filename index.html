<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Not Found</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(-135deg, #0c0c1e 0%, #07070f 50%, #000 100%);
      font-family: -apple-system, sans-serif;
      color: #fff;
      text-align: center;
    }
    h1 { font-size: 6rem; font-weight: 800; color: rgba(255, 255, 255, 0.1); line-height: 1; }
    h2 { font-size: 1.2rem; font-weight: 700; margin: 8px 0; }
    p  { font-size: 0.9rem; color: rgba(255,255,255,0.35); }
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <h2>Nothing here.</h2>
    <p>If you were looking for something, you may have the wrong link.</p>
  </div>
</body>
</html>
